name: Backend CI/CD (Docker)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build Docker image (test build)
        run: |
          docker build -t futurex-app .

      - name: Run container (smoke test)
        run: |
          docker run -d -p 7860:7860 --name test-container futurex-app
          sleep 10
          docker ps
          docker logs test-container

      - name: Stop test container
        run: |
          docker stop test-container
          docker rm test-container

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to EC2 via SSH (Docker)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            APP_DIR="/home/${{ secrets.USER }}/futurex-feaser"

            # Clone if not exists
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone https://github.com/Agility-AI-Pvt-Ltd/futurex-feaser.git "$APP_DIR"
            fi

            cd "$APP_DIR"

            # Pull latest code
            git pull origin main

            # Stop old container if running
            docker stop futurex || true
            docker rm futurex || true

            # Remove old image (optional cleanup)
            docker rmi futurex-app || true

            # Build new Docker image
            docker build -t futurex-app .

            # Run new container
            docker run -d \
              --name futurex \
              -p 7860:7860 \
              --restart always \
              futurex-app

            # Show running containers
            docker ps

