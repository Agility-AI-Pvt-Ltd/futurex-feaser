name: Backend CI/CD (Docker)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build Docker image (test build)
        run: |
          docker build -t futurex-app .

      - name: Run container (smoke test)
        run: |
          if [ -z "${{ secrets.POSTGRES_URL }}" ]; then
            echo "POSTGRES_URL secret is not set; skipping smoke test container run."
            exit 0
          fi

          docker run -d -p 7860:7860 --name test-container \
            -e POSTGRES_URL='${{ secrets.POSTGRES_URL }}' \
            -e OPENAI_API_KEY='${{ secrets.OPENAI_API_KEY }}' \
            futurex-app
          sleep 10
          docker ps -a
          docker logs test-container
          curl -f http://127.0.0.1:7860/

      - name: Stop test container
        run: |
          docker stop test-container || true
          docker rm test-container || true

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to EC2 via SSH (Docker)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 30m
          request_pty: true
          debug: true
          script: |
            set -euo pipefail

            APP_DIR="/home/${{ secrets.USER }}/futurex-feaser"
            ENV_FILE="$APP_DIR/.env"

            # Clone if not exists
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone https://github.com/Agility-AI-Pvt-Ltd/futurex-feaser.git "$APP_DIR"
            fi

            cd "$APP_DIR"

            # Pull latest code
            git fetch origin
            git reset --hard origin/main

            # Stop old container if running
            docker stop futurex || true
            docker rm futurex || true

            # Remove old image (optional cleanup)
            docker rmi futurex-app || true

            # Build new Docker image
            docker build -t futurex-app .

            if [ ! -f "$ENV_FILE" ]; then
              echo "Missing env file: $ENV_FILE"
              exit 1
            fi

            # Run new container
            docker run -d \
              --name futurex \
              -p 7860:7860 \
              --env-file "$ENV_FILE" \
              --restart always \
              futurex-app

            # Show running containers
            docker ps

            # Wait for the service to become healthy before failing the deploy.
            for i in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:7860/ >/dev/null; then
                echo "Deployment health check passed."
                exit 0
              fi
              sleep 2
            done

            # Deployment diagnostics
            docker ps -a
            docker logs --tail 100 futurex || true
            curl -f http://127.0.0.1:7860/ || exit 1
